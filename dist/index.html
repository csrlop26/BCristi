                @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700;1,900&family=Inter:wght@300;400;500;600;700;800&display=swap');

                :root {
                    --primary:     ${S.primary};
                    --dark:        ${S.dark};
                    --bg:          ${S.bg};
                }

                *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
                html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
                body { background-color: ${S.bg}; }
                a { text-decoration: none; color: inherit; }
                button { cursor: pointer; border: none; background: none; font-family: inherit; }
                img { display: block; max-width: 100%; }

                ::-webkit-scrollbar { width: 6px; }
                ::-webkit-scrollbar-track { background: ${S.bg}; }
                ::-webkit-scrollbar-thumb { background: ${S.surfaceHigh}; border-radius: 3px; }
                ::-webkit-scrollbar-thumb:hover { background: ${S.onSurfaceVariant}; }

                /* \u2500\u2500 KEYFRAMES \u2500\u2500 */
                @keyframes shimmer {
                    0%   { background-position: -250% center; }
                    100% { background-position: 250% center; }
                }
                @keyframes scrollDrip {
                    0%        { transform: scaleY(0); transform-origin: top; opacity: 0; }
                    30%, 70%  { transform: scaleY(1); transform-origin: top; opacity: 1; }
                    100%      { transform: scaleY(0); transform-origin: bottom; opacity: 0; }
                }
                @keyframes badgeSpin {
                    from { transform: rotate(0deg); }
                    to   { transform: rotate(360deg); }
                }
                @keyframes orbPulse {
                    0%, 100% { opacity: 0.6; transform: scale(1); }
                    50%      { opacity: 1;   transform: scale(1.08); }
                }
                @keyframes orbFloat {
                    0%, 100% { transform: translateY(0) scale(1); }
                    50%      { transform: translateY(-18px) scale(1.04); }
                }
                @keyframes marqueeScroll {
                    from { transform: translateX(0); }
                    to   { transform: translateX(-33.333%); }
                }
                @keyframes fadeUp {
                    from { opacity: 0; transform: translateY(18px); }
                    to   { opacity: 1; transform: translateY(0); }
                }

                /* \u2500\u2500 CTA gradient \u2500\u2500 */
                .cta-shimmer {
                    background: linear-gradient(
                        90deg, ${S.primary} 0%, #D4883A 25%, #E8A050 50%, #D4883A 75%, ${S.primary} 100%
                    ) !important;
                    background-size: 300% 100% !important;
                    animation: shimmer 3.5s ease-in-out infinite;
                }

                /* \u2500\u2500 Scroll drip \u2500\u2500 */
                .scroll-drip { animation: scrollDrip 2.2s ease-in-out infinite; }

                /* \u2500\u2500 Badge rotation \u2500\u2500 */
                .hero-badge-track { animation: badgeSpin 28s linear infinite; }

                /* \u2500\u2500 Gallery hover \u2500\u2500 */
                .ig-photo { position: relative; overflow: hidden; border-radius: 8px; }
                .ig-photo::after {
                    content: '';
                    position: absolute; inset: 0;
                    background: linear-gradient(145deg, rgba(200,116,42,0.15) 0%, rgba(12,26,13,0.55) 100%);
                    opacity: 0; transition: opacity 0.45s ease;
                }
                .ig-photo:hover::after { opacity: 1; }
                .ig-photo img { transition: transform 0.65s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
                .ig-photo:hover img { transform: scale(1.06); }

                /* \u2500\u2500 Featured row bar \u2500\u2500 */
                .feat-row { position: relative; overflow: hidden; }
                .feat-row::before {
                    content: ''; position: absolute; left: 0; top: 0; bottom: 0;
                    width: 2.5px;
                    background: linear-gradient(to bottom, ${S.primary}, ${S.secondary});
                    transform: scaleY(0); transform-origin: bottom;
                    border-radius: 2px; transition: transform 0.38s cubic-bezier(0.22, 1, 0.36, 1);
                }
                .feat-row:hover::before { transform: scaleY(1); }

                /* \u2500\u2500 Location card \u2500\u2500 */
                .loc-card-active {
                    box-shadow: 0 0 0 1.5px ${S.primary}44, 0 8px 40px rgba(200,116,42,0.08) !important;
                }

                /* \u2500\u2500 Menu \u2500\u2500 */
                .menu-card:hover { background-color: rgba(255,255,255,0.02) !important; }
                input::placeholder { color: #6A8A6C; opacity: 0.7; }
                .cat-btn-active {
                    box-shadow: 0 0 16px rgba(240,184,122,0.18) !important;
                }
                .menu-search:focus {
                    outline: none !important;
                    border-color: rgba(240,184,122,0.5) !important;
                    box-shadow: 0 0 0 3px rgba(240,184,122,0.10) !important;
                }

                /* \u2500\u2500 Nav link hover \u2500\u2500 */
                .nav-link { position: relative; }
                .nav-link::after {
